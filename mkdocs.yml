site_name: CPTS Writeups
site_url: https://thewzz.github.io/cpts-writeups
site_description: Writeups do curso preparatório CPTS
site_author: Matheus Navarro de Franca

extra_css:
  - stylesheets/extra.css
  - stylesheets/home.css

theme:
  name: material
  custom_dir: docs/overrides
  icon:
    logo: hacking
  palette:
    - scheme: slate
      primary: teal
      accent: teal
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - Máquinas:
    - Índice: machines/index.md
    - Concluídos:
      - Easy:
        - Getting Started: machines/getting-started.md
        - Robot: machines/robot.md
        - CAP: machines/cap.md
        - Dancing: machines/dancing.md
        - Redeemer: machines/redeemer.md
    - Em Andamento:
      - Easy:
        - Silentium: machines/silentium.md
        - Facts: machines/facts.md
  - Home: index.md
  - Anotações:
    - Índice: notes/index.md